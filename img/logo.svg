<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">

  <!-- lo sfondo nero, tutto il quadrato -->
  <rect x="0" y="0" width="120" height="120" fill="#111"/>

  <!-- il simbolo del prompt ">" disegnato con due linee -->
  <polyline points="30,45 45,60 30,75"
            fill="none" stroke="#fff" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- il cursore che lampeggia -->
  <rect x="58" y="68" width="30" height="8" fill="#fff">
    <animate attributeName="opacity"
             values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

</svg>
